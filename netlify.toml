[build]
  command = "npm run build"
  publish = "dist"

# Once www.justinjohnson.de is added and set as the primary domain in Netlify,
# this permanently redirects the old *.netlify.app URL to it.
[[redirects]]
  from = "https://justin-johnson.netlify.app/*"
  to = "https://www.justinjohnson.de/:splat"
  status = 301
  force = true

# Redirect the apex domain to the www subdomain (now canonical).
[[redirects]]
  from = "https://justinjohnson.de/*"
  to = "https://www.justinjohnson.de/:splat"
  status = 301
  force = true

# Client-side routing fallback (e.g. /cv) for direct loads and refreshes.
# Only applies when no physical file matches the request path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build assets (JS/CSS/images) never change content under the same
# filename, so they're safe to cache for a year — speeds up repeat crawls
# and page loads, which factors into Core Web Vitals / search ranking.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline hardening headers on every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
